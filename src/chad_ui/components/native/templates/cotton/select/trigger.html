{% with component='select' %}
{% firstof handle 'handle-'|add:component as handle %}

<c-vars size="default" asChild />

<button data-slot="{{ component }}-trigger"
  x-data="{
    disabled: {{ disabled|yesno:'true,false' }},
    asChild: {{ asChild|yesno:'true,false' }},
    component: '{{ component }}',
    root: null,
    detached: null,
    tId: '{{ attrs.id }}',
    findRoot() {
      const p = this.$el.parentElement;
      if (p.getAttribute('data-slot') === this.component) return p;
      return Array.from(document.querySelectorAll(`[x-data][data-slot='${this.component}']`))
        .find(n => { try { return Alpine.$data(n).handle === this.handle; } catch { return false; } });
    },
    initState() {
      this.root = this.findRoot();
      if (!this.tId) this.tId = $id(`${this.root.id}-trigger`) || $id(`chad-ui_r_${this.component}-trigger`);
    },
    init() {
      this.$nextTick(() => this.initState());
    },
    handleTrigger(event) {
      if (!this.root || this.disabled) return;
      const rData = Alpine.$data(this.root);
      if (rData._hiding) return;
      if (content) content.removeAttribute('aria-hidden');
      if (!this.detached) toggleContent(event);
      else $dispatch(this.handle);
    },
    handleKeydown(event) {
      event.preventDefault();
      this.handleTrigger(event);
    },
    handleResize(size) {
      if (!content || !size.width || !size.height) return;
      Alpine.$data(content).width = size.width;
    }
  }"
  x-resize="handleResize({ width: $width, height: $height});"
  :id="tId"
  @click="handleTrigger($event)"
  @keydown.enter="handleKeydown($event)"
  type="button"
  tabindex="0"
  aria-haspopup="listbox"
  data-size="{{ size|lower }}"
  class="w-full border-input data-placeholder:text-muted-foreground dark:bg-input/30 dark:hover:bg-input/50 focus-visible:border-ring focus-visible:ring-ring/50 aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive dark:aria-invalid:border-destructive/50 gap-1.5 rounded-md border bg-transparent py-2 pr-2 pl-2.5 text-sm shadow-xs transition-[color,box-shadow] focus-visible:ring-[3px] aria-invalid:ring-[3px] data-[size=default]:h-9 data-[size=sm]:h-8 *:data-[slot=select-value]:flex *:data-[slot=select-value]:gap-1.5 [&_svg:not([class*='size-'])]:size-4 flex items-center justify-between whitespace-nowrap outline-none disabled:cursor-not-allowed disabled:opacity-50 *:data-[slot=select-value]:line-clamp-1 *:data-[slot=select-value]:flex *:data-[slot=select-value]:items-center [&_svg]:pointer-events-none [&_svg]:shrink-0{% if class %} {{ class }}{% endif %}" 
  {{ attrs }}
>
  {{ slot }}
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" 
    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
    class="pointer-events-none text-muted-foreground size-4" 
    aria-hidden="true"
  >
    <path d="m6 9 6 6 6-6"></path>▼
  </svg>
</button>

{% endwith %}
