{% with component='select' %}
{% firstof handle 'handle-'|add:component as handle %}

<c-vars field defaultValue defaultOpen items modal multiple disabled :required="True" />

<div data-slot="{{ component }}" 
  x-data="{
    defaultValue: '{% if defaultValue %}{{ defaultValue }}{% elif field.value %}{{ field.value }}{% endif %}',
    open: {{ defaultOpen|yesno:'true,false' }},
    items: {% if field %}{ {% for value, text in field.field.choices %}{% if value %}label: '{{ text }}', value: '{{ value }}'{% if not forloop.last %}, {% endif %}{% endif %}{% endfor %} }{% else %}null{% endif %},
    modal: {{ modal|yesno:'true,false' }},
    multiple: {{ multiple|yesno:'true,false' }},
    disabled: {{ disabled|yesno:'true,false' }},
    required: {{ required|yesno:'true,false,true' }},
    values: [],
    selected: {},
    selectedText: [],
    content: null,
    field: null,
    component: '{{ component }}',
    id: '{{ attrs.id }}',
    init() {
      this.field = this.$el.closest('[x-data][data-slot=field]');
      this._control = $el.querySelector('select');
      this.trigger = $el.querySelector(`[data-slot=${this.component}-trigger]`);
      if (this.field) {
        const fData = Alpine.$data(this.field);
        this.id ||= fData.getStore()[`${this.field.id}`]?.controlId
      }
      this.id ||= $id(`chad-ui_r_${this.component}`);
      this.$nextTick(() => {
        this.content = document.getElementById(`${this.id}-portal`).querySelector(`[data-slot=${this.component}-content]`);
        this.values = Array.from(this.content.querySelectorAll(`[data-slot=${this.component}-item]`))
          .map(item => Alpine.$data(item).value);
        this.selected = this.values.reduce((selected, value) => ({ ...selected, [value]: false}), {})
        if (this.defaultValue && Object.keys(this.selected).includes(this.defaultValue)) {
          const defaultValues = this.defaultValue.split(',').map((value) => value.trim());
          defaultValues.forEach(value => this.toggle(value));
        }
        if (this.$el._stopWatcher) this.$el._stopWatcher();
        this.$el._stopWatcher = this.$watch('open', open => {
          if (!open) return;
          htmx.process(this.content);
          let lastValue = Object.keys(this.selected).findLast(value => this.selected[value]);
          if (!lastValue) lastValue =  Object.keys(this.selected)[0];
          const cData = Alpine.$data(this.content);
          cData.highlightedIndex = this.values.indexOf(lastValue);
          cData.handleFocus(cData.items[cData.highlightedIndex]);
          if (cData.alignItemWithTrigger) cData.handleAlignmentWithTrigger();
        });
      });
    },
    setDisabled(el) {
      if (el.matches('button, input, textarea, select, fieldset')) {
        el.setAttribute('disabled', '');
        el.setAttribute('aria-disabled', 'true');
      }
      el.setAttribute('data-disabled', '');
    },
    setErrorStyle() {
      if (this.trigger) this.trigger.setAttribute('aria-invalid', 'true');
    },
    unsetErrorStyle() {
      if (this.trigger) this.trigger.removeAttribute('aria-invalid');
    },
    showContent(event) {
      if (this._hiding) return;
      const aEl = document.activeElement;
      if (aEl && aEl !== document.body) this._lastFocused = aEl;
      this.trigger = event?.target.closest(`[data-slot=${this.component}-trigger]`)
      this.open = true;
    },
    hideContent() {
      if (this._hiding) return;
      this._hiding = true;
      this.trigger = null;
      this.open = false;
      this.$nextTick(() => {
        if (this._lastFocused && document.contains(this._lastFocused)) _lastFocused.focus();
        if (this.field && validationMode === 'blur' && Object.values(this.selected).some(Boolean)) htmx.trigger(this._control, 'change');
        this._hiding = false;
      });
    },
    toggleContent(event) {
      if (this.open) this.hideContent();
      else this.showContent(event);
    },
    toggle(value) {
      const selectedKeys = Object.keys(this.selected).filter(k => this.selected[k]);
      if (!this.multiple) this.selected = { [value]: this.required ? true : !this.selected[value] };
      else this.selected[value] = !this.required ? !this.selected[value] : selectedKeys.length > 1 ? !this.selected[value] : true;
      const selectedItems = Array.from(this.content.querySelectorAll(`[data-slot=${this.component}-item]`))
        .filter(item => this.selected[Alpine.$data(item).value]);
      this.selectedText = selectedItems.map(item => item.firstElementChild?.textContent?.trim()).filter(Boolean);
    },
    destroy() {
      if (this.$el._stopWatcher) {
        this.$el._stopWatcher();
        this.$el._stopWatcher = null;
      }
    },
  }"
  :id="id"
  @{{ handle }}.window="toggleContent()"
  @hide-{{ component }}.window="if (open && (!$event.detail || !$event.detail.handle || $event.detail.handle === handle)) hideContent()"
  @keydown.escape.window="if (open && content?.contains($event.target)) {
    $event.preventDefault();
    $event.stopImmediatePropagation();
    hideContent();
  }"
  x-id="[`${this.id}-label`, `${this.id}-item`]"
  class="{% if class %} {{ class }}{% endif %}"
>
  {{ slot }}
    <select name="{% if field %}{{ field.name }}{% else %}{{ attrs.name }}{% endif %}" class="left-1/2 sr-only transform-x-1/2" 
      x-data="{
        init() {
          if (!this._field) return;
          const fData = Alpine.$data(this._field);
          $watch('selected', (selected) => {
            if (fData.getStore()[`${this._field?.id}`]?.formSubmit) {
              fData.renderErrors();
              fData.getStore()[`${this._field.id}`].formSubmit = false;
              return;
            }; 
            if (Object.values(selected).filter(Boolean).length > 0) {
              if (validationMode !== 'change') clearErrors();
              if (validationMode === 'change') htmx.trigger(this._control, 'change');
            }
            else {
              fData.clearErrors();
            }
          });
        }
      }"
      :multiple="multiple ? '' : null" 
      @focus.self="$nextTick(() => document.activeElement == $el && toggleContent())"
      id="{{ field.id_for_label}}"
      hx-swap="outerMorph"
      tabindex="-1"
      {{ attrs|cut:"disabled"|cut:"hx-trigger" }}
    >
      <template x-for="val in values">
        <option 
          :value="val"
          :selected="selected && selected[val] === true"
        ></option>
      </template>
    </select>
</div>

{% endwith %}
