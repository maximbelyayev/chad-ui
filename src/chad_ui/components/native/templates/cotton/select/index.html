{% with component='select' %}
{% firstof handle 'handle-'|add:component as handle %}

<c-vars field defaultValue defaultOpen items modal multiple />

<div data-slot="{{ component }}" 
    x-data="{
        field: null,
        defaultValue: '{% if defaultValue %}{{ defaultValue }}{% elif field.value %}{{ field.value }}{% endif %}',
        selected: {},
        open: {{ defaultOpen|yesno:'true,false' }},
        items: {% if field %}{ {% for value, text in field.field.choices %}{% if value %}label: '{{ text }}', value: '{{ value }}'{% if not forloop.last %}, {% endif %}{% endif %}{% endfor %}}{% elif items %}{{ items }}{% else %}null{% endif %},
        modal: {{ modal|yesno:'true,false' }},
        multiple: {{ multiple|yesno:'true,false' }},
        trap: false,
        trigger: null,
        content: null,
        selectedTexts: [],
        itemValues: [],
        component: '{{ component }}',
        id: '{{ attrs.id }}',
        initStore() {
            this.$store['chad-ui'] ??= {};
            this.$store['chad-ui'][this.component] ??= {};
            this.$store['chad-ui'][this.component][`${this.id}`] ??= {};
        },
        getStore(global = false) {
            if (global) return this.$store['chad-ui']
            return this.$store['chad-ui'][this.component];
        },
        initIndex() {
            this.field = this.findField();
            const fData = Alpine.$data(this.field);
            if (!this.id) this.id = fData.getStore()[`${this.field.id}`]?.controlId || $id(`chad-ui_r_${this.component}`);
            this.initStore();
            this.trigger = $el.querySelector(`[data-slot=${this.component}-trigger]`);
            this.$nextTick(() => {
                this.content = document.getElementById(`${this.id}-portal`).querySelector(`[data-slot=${this.component}-content]`);
            })
        },
        init() {
            this.initIndex();
            this.$nextTick(() => {
                this.itemValues = Array.from(this.content.querySelectorAll(`[data-slot=${this.component}-item]`))
                    .map(item => Alpine.$data(item).itemValue);
                if (this.defaultValue) {
                    const defaultValues = this.defaultValue.split(',').map((value) => value.trim());
                    defaultValues.forEach(value => this.toggle(value));
                }
            });
        },
        findField() {
            const p = this.$el.closest('[data-slot=field]');
            if (p.hasAttribute('x-data')) return p;
        },
        setErrorStyle() {
            if (this.trigger) this.trigger.setAttribute('aria-invalid', 'true');
        },
        unsetErrorStyle() {
            if (this.trigger) this.trigger.removeAttribute('aria-invalid');
        },
        toggleContent(event) {
            if (this.open) { this.trap = false; this.hideContent(); }
            else { this.trap = true; this.showContent(event); }
        },
        showContent(event) {
            this.trigger = event.target.closest(`[data-slot=${this.component}-trigger]`);
            this.open = true;
        },
        hideContent() {
            this.trigger = null;
            this.open = false;
        },
        toggle(value) {
            if (!this.multiple) {
                this.selected = { [value]: !this.selected[value] };
            } else {
                this.selected[value] = !this.selected[value];
            }
            const selectedItems = Array.from(this.content.querySelectorAll(`[data-slot=${this.component}-item]`))
                .filter(item => this.selected[Alpine.$data(item).itemValue]);
            this.selectedTexts = selectedItems.map(item => item.firstElementChild?.textContent?.trim()).filter(Boolean);
            const select = $el.querySelector('select');
            if (select && this.field) {
                const fieldId = this.field.id;
                select.setAttribute('hx-target', `#${fieldId}`);
                select.setAttribute('hx-select', `#${fieldId}`);
                htmx.process(select);
                //htmx.trigger(select, 'change');  // manually fire after everything is ready
            }
        },
    }"
    :id="id"
    @{{ handle }}.window="toggleContent($event)"
    @hide-{{ component }}.window="if (open && (!$event.detail || !$event.detail.handle || $event.detail.handle === handle)) hideMenu()"
    x-id="[`${this.id}-label`, `${this.id}-item`]"
>
    {{ slot }}
    {% if field %}
        <select name="{{ field.name }}" class="left-1/2 sr-only transform-x-1/2" 
                :multiple="multiple ? '' : null" 
                x-data="{
                    init() {
                        $watch('selected', (selected) => {
                            const fData = Alpine.$data(field);
                            if (fData.getStore()[`${field.id}`].formSubmit) {
                                fData.renderErrors();
                                fData.getStore()[`${field.id}`].formSubmit = false;
                                return;
                            };
                            if (Object.keys(selected).length > 0) {
                                htmx.trigger($el, 'change');
                            }
                        });
                    }
                }"
                id="{{ field.id_for_label}}"
                hx-swap="outerMorph"
                required
                {{ attrs|cut:"disabled"|cut:"hx-trigger" }}
        >
            <template x-for="val in itemValues">
                <option 
                    :value="val"
                    :selected="selected && selected[val] === true"
                ></option>
            </template>
        </select>
    {% endif %}
</div>

{% endwith %}
