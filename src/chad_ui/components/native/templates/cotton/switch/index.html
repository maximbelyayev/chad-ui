<c-vars defaultChecked disabled size="default" only=True />

<span data-slot="switch"
  x-data="{
    checked: {{ defaultChecked|yesno:'true,false' }},
    disabled: {{ disabled|yesno:'true,false' }},
    toggleChecked() {
      if (this.disabled || this.readOnly) return;
      this.checked = !this.checked;
      this.$refs.input.checked = this.checked;
      this.$refs.input.dispatchEvent(new Event('change', { bubbles: true }));
    }
  }"
  class="peer group/switch relative inline-flex shrink-0 items-center rounded-full border border-transparent shadow-xs transition-all outline-none after:absolute after:-inset-x-3 after:-inset-y-2 focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 aria-invalid:border-destructive aria-invalid:ring-3 aria-invalid:ring-destructive/20 data-[size=default]:h-[18.4px] data-[size=default]:w-[32px] data-[size=sm]:h-[14px] data-[size=sm]:w-[24px] dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 data-checked:bg-primary data-unchecked:bg-input dark:data-unchecked:bg-input/80 data-disabled:cursor-not-allowed data-disabled:opacity-50{% if class %} {{ class }}{% endif %}"
  {% with form_attrs='name,required,form,value,checked,disabled,id' vars='defaultChecked,indeterminate,value,nativeButton,disabled,readOnly,asChild' %}
    {% for key, value in attrs.items %}
      {% if key not in form_attrs and key not in vars %}
        {{ key }}{% if value != True %}="{{ value }}"{% endif %}
      {% endif %}
    {% endfor %}
  {% endwith %}
  @click="toggleChecked()"
  @keydown.enter.prevent="toggleChecked()"
  :data-checked="checked ? '' : null"
  :data-unchecked="checked ? null : ''"
  :aria-checked="checked"
  :data-disabled="disabled ? '' : null"
  data-size="{{ size|lower }}"
  tabindex="0"
  role="switch"
>
  <span
    data-slot="switch-thumb"
    class="pointer-events-none block rounded-full bg-background ring-0 transition-transform group-data-[size=default]/switch:size-4 group-data-[size=sm]/switch:size-3 group-data-[size=default]/switch:data-checked:translate-x-[calc(100%-2px)] group-data-[size=sm]/switch:data-checked:translate-x-[calc(100%-2px)] dark:data-checked:bg-primary-foreground group-data-[size=default]/switch:data-unchecked:translate-x-0 group-data-[size=sm]/switch:data-unchecked:translate-x-0 dark:data-unchecked:bg-foreground"
    :data-checked="checked ? '' : null"
    :data-unchecked="checked ? null : ''"
  />
</span>
<input
  x-ref="input"
  :checked="checked"
  {% if attrs.id %}id="{{ attrs.id }}"{% endif %}
  {% if attrs.name %}name="{{ attrs.name }}"{% endif %}
  {% if attrs.value %}value="{{ attrs.value }}"{% endif %}
  {% if attrs.form %}form="{{ attrs.form }}"{% endif %}
  {% if attrs.required %}required{% endif %}
  {% if attrs.disabled %}disabled{% endif %}
  :disabled="disabled"
  type="checkbox"
  tabindex="-1"
  aria-hidden="true"
  style="clip-path: inset(50%); overflow: hidden; white-space: nowrap; border: 0; padding: 0; width: 1px; height: 1px; margin: -1px; position: absolute;"
/>
