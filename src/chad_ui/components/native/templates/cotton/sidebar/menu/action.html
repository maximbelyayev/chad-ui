<c-vars showOnHover asChild />

<button
    x-data="{
        xShow: true,
        inMenuSubItem: false,
        showOnHover: {{ showOnHover|yesno:'true,false' }},
        init() {
            if (this.showOnHover) this.xShow = false;
            if ($el.parentElement.getAttribute('data-sidebar') === 'menu-sub-item') this.inMenuSubItem = true;
        },
        show() {
            if (this.showOnHover) this.xShow = true;
        },
        hide() {
            if (this.showOnHover) this.xShow = false;
        }
    }"
    x-show="xShow"
    :class="inMenuSubItem ? 'top-1' : 'top-1.5'"
    class="absolute right-1 flex aspect-square w-5 items-center justify-center rounded-md p-0 text-sidebar-foreground ring-sidebar-ring outline-hidden transition-transform group-data-[collapsible=icon]:hidden peer-hover/menu-button:text-sidebar-accent-foreground peer-data-[size=default]/menu-button:top-1.5 peer-data-[size=lg]/menu-button:top-2.5 peer-data-[size=sm]/menu-button:top-1 after:absolute after:-inset-2 hover:bg-sidebar-accent hover:text-sidebar-accent-foreground focus-visible:ring-2 md:after:hidden [&>svg]:size-4 [&>svg]:shrink-0{% if class %} {{ class }}{% endif %}"
    {{ attrs }}
    type="button"
    data-slot="sidebar-menu-action"
    data-sidebar="menu-action"
>
    {{ slot }}
</button>
