{% with component='sidebar' %}

<c-vars size="md" variant="default" isActive asChild />
<a
    x-data="{
        isActive: {{ isActive|yesno:'true,false' }},
        asChild: {{ asChild|yesno:'true,false' }},
        component: '{{ component }}',
        findProvider() {
            return $el.closest(`[x-data][data-slot='${this.component}-wrapper']`);
        },
        initChild() {
            const r = this.findProvider();
            if (this.asChild && r) {
                const rData = Alpine.$data(r);
                if (typeof rData.initAsChild === 'function' && rData.initAsChild(this.$el)) return true;
            }
            return false;
        },
        init() {
            if (this.initChild()) return;
        },
    }"
    data-slot="sidebar-menu-sub-button" 
    data-sidebar="menu-sub-button" 
    data-size="{{ size }}" 
    :data-active="isActive ? '' : null" 
    class="flex h-7 min-w-0 -translate-x-px items-center gap-2 overflow-hidden rounded-md px-2 text-sidebar-foreground ring-sidebar-ring outline-hidden group-data-[collapsible=icon]:hidden hover:bg-sidebar-accent hover:text-sidebar-accent-foreground focus-visible:ring-2 active:bg-sidebar-accent active:text-sidebar-accent-foreground disabled:pointer-events-none disabled:opacity-50 aria-disabled:pointer-events-none aria-disabled:opacity-50 data-[size=md]:text-sm data-[size=sm]:text-xs data-active:bg-sidebar-accent data-active:text-sidebar-accent-foreground [&>span:last-child]:truncate [&>svg]:size-4 [&>svg]:shrink-0 [&>svg]:text-sidebar-accent-foreground{% if class %} {{ class }}{% endif %}"
    {{ attrs }}
>   
    {{ slot }}
</a>

{% endwith %}
