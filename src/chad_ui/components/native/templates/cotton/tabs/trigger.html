<c-vars value disabled />

<button
    x-data="{
        value: '{{ value }}',
        disabled: {{ disabled|yesno:'true,false' }},
        content: null,
        init() {
            this.$nextTick(() => {
                this.content = $el.querySelector('[data-slot=tabs-content]')
            })
            this.$watch('tabsOpen', tabsOpen => {
                if (isOpen(this.value)) $el.setAttribute('aria-controls', this.content?.id)
                else $el.removeAttribute('aria-controls')
            })
            if (this.disabled) setDisabled($el)
        }
    }"
    class="relative inline-flex h-[calc(100%-1px)] flex-1 items-center justify-center gap-1.5 rounded-md border border-transparent px-2 py-1 text-sm font-medium whitespace-nowrap text-foreground/60 transition-all group-data-[orientation=vertical]/tabs:w-full group-data-[orientation=vertical]/tabs:justify-start hover:text-foreground focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 focus-visible:outline-1 focus-visible:outline-ring disabled:pointer-events-none disabled:opacity-50 has-data-[icon=inline-end]:pr-1.5 has-data-[icon=inline-start]:pl-1.5 aria-disabled:pointer-events-none aria-disabled:opacity-50 dark:text-muted-foreground dark:hover:text-foreground group-data-[variant=default]/tabs-list:data-active:shadow-sm group-data-[variant=line]/tabs-list:data-active:shadow-none [&_svg]:pointer-events-none [&_svg]:shrink-0 [&_svg:not([class*='size-'])]:size-4 group-data-[variant=line]/tabs-list:bg-transparent group-data-[variant=line]/tabs-list:data-active:bg-transparent dark:group-data-[variant=line]/tabs-list:data-active:border-transparent dark:group-data-[variant=line]/tabs-list:data-active:bg-transparent data-active:bg-background data-active:text-foreground dark:data-active:border-input dark:data-active:bg-input/30 dark:data-active:text-foreground after:absolute after:bg-foreground after:opacity-0 after:transition-opacity group-data-[orientation=horizontal]/tabs:after:inset-x-0 group-data-[orientation=horizontal]/tabs:after:bottom-[-5px] group-data-[orientation=horizontal]/tabs:after:h-0.5 group-data-[orientation=vertical]/tabs:after:inset-y-0 group-data-[orientation=vertical]/tabs:after:-right-1 group-data-[orientation=vertical]/tabs:after:w-0.5 group-data-[variant=line]/tabs-list:data-active:after:opacity-100{% if class %} {{ class }}{% endif %}"
    {{ attrs }}
    @click="toggle(value)"
    :data-value="value"
    :data-orientation="orientation"
    :data-active="isOpen(value) ? '' : null"
    :aria-disabled="disabled"
    :aria-controls="content"
    :aria-selected="isOpen(value)"
    type="button"
    role="tab"
    :tabindex="isOpen(value) ? 0 : -1"
>
    {{ slot }}
</button>
