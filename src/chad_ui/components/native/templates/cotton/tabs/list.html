<c-vars variant="default" />

<div
    class="group/tabs-list inline-flex w-fit items-center justify-center rounded-lg p-[3px] text-muted-foreground group-data-horizontal/tabs:h-9 group-data-vertical/tabs:h-fit group-data-vertical/tabs:flex-col data-[variant=line]:rounded-none
    {% if variant|lower == 'default' %} bg-muted
    {% elif variant|lower == 'line' %} gap-1 bg-transparent{% endif %}
    {% if class %} {{ class }}{% endif %}"
    {{ attrs }}
    data-variant="{{ variant|lower }}"
    data-slot="tabs-list"
>
    {{ slot }}
</div>
