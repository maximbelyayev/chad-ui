<c-vars orientation="horizontal" />

<div
  x-data="{ 
    orientation: '{{ orientation|lower }}',
    initAsChild(el) {
      const c = el.firstElementChild;
      if (!c) return false;
      if (c.hasAttribute('x-data')) {
        if (c.getAttribute('x-data').includes('asChild: true')) {
          this.$nextTick(() => this.initAsChild(c) && this.initAsChild(el));
          return true;
        }
        return false;
      }
      [...el.attributes].forEach(attr => {
        if (attr.name !== 'data-slot' && (c.hasAttribute(attr.name) || attr.name === 'class')) return;
        if (attr.name === 'x-data') {
          c.setAttribute('x-data', attr.value.replace(/asChild:\s*true/, 'asChild: false'));
          return;
        }
        const key = attr.name.match(/^(?::|x-bind:)(.+)/)?.[1]
        if (key) {
          let value;
          try { value = Alpine.evaluate(el, attr.value); } catch { }
          value === null || value === false
            ? c.removeAttribute(key)
            : c.setAttribute(key, value === true ? '' : value);
          c.removeAttribute(attr.name);
          return;
        }
        c.setAttribute(attr.name, attr.value);
      });
      c.classList.add(...el.classList);
      el.replaceWith(c);
      return true;
    },
  }"
  :data-orientation="orientation"
  role="group"
  data-slot="button-group"
  class="has-[>[data-slot=button-group]]:gap-2 has-[select[aria-hidden=true]:last-child]:[&>[data-slot=select-trigger]:last-of-type]:rounded-r-md flex w-fit items-stretch [&>*]:focus-visible:z-10 [&>*]:focus-within:z-10 [&>*]:focus-visible:relative [&>*]:focus-within:relative [&>[data-slot=select-trigger]:not([class*='w-'])]:w-fit [&>input]:flex-1
    {% if orientation == 'horizontal' %}
    [&>[data-slot]]:rounded-r-none
    [&>[data-slot]:not(:has(~[data-slot]))]:rounded-r-md!
    [&>[data-slot]~[data-slot]]:rounded-l-none
    [&>[data-slot]~[data-slot]]:border-l-0
    [&>[data-slot]:not([data-slot=button-group])_button]:rounded-r-none
    [&>[data-slot]:not(:has(~[data-slot])):not([data-slot=button-group])_button]:rounded-r-md!
    [&>[data-slot]~[data-slot]:not([data-slot=button-group])_button]:rounded-l-none
    [&>[data-slot]~[data-slot]:not([data-slot=button-group])_button]:border-l-0
    {% elif orientation == 'vertical' %}
    flex-col
    [&>:not([data-slot=button-group]):not([data-slot=button])_button]:w-full
    [&>[data-slot]]:rounded-b-none
    [&>[data-slot]:not(:has(~[data-slot]))]:rounded-b-md!
    [&>[data-slot]~[data-slot]]:rounded-t-none
    [&>[data-slot]~[data-slot]]:border-t-0
    [&>[data-slot]:not([data-slot=button-group])_button]:rounded-b-none
    [&>[data-slot]:not(:has(~[data-slot])):not([data-slot=button-group])_button]:rounded-b-md!
    [&>[data-slot]~[data-slot]:not([data-slot=button-group])_button]:rounded-t-none
    [&>[data-slot]~[data-slot]:not([data-slot=button-group])_button]:border-t-0
    {% endif %}{% if class %} {{ class }}{% endif %}
  "
  {{ attrs }}
>
  {{ slot }}
</div>
