{% with component='tooltip' %}
{% firstof handle 'handle-'|add:component as handle %}

<c-vars handle disabled openOnHover delay="" closeDelay="" asChild />

<div data-slot="{{ component }}-trigger"
    x-data="{
        handle:'{{ handle }}',
        disabled: {{ disabled|yesno:'true,false' }},
        openOnHover: {{ openOnHover|yesno:'true,false' }},
        delay: '{{ delay }}',
        closeDelay: '{{ closeDelay }}',
        asChild: {{ asChild|yesno:'true,false' }},
        component: '{{ component }}',
        root: null,
        tId: '{{ attrs.id }}',
        findRoot() {
            const p = this.$el.parentElement;
            if (p.getAttribute('data-slot') === this.component) return p;
            return Array.from(document.querySelectorAll(`[x-data][data-slot='${this.component}']`))
                .find(n => { try { return Alpine.$data(n).handle === this.handle; } catch { return false; } });
        },
        initState() {
            if (!this.tId) this.tId = `${this.root.id}-trigger` || $id(`chad-ui_r_${this.component}-trigger`);
            const pData = Alpine.$data(Alpine.$data(this.root).findProvider());
            if (!this.delay) this.delay = pData.delay;
            if (!this.closeDelay) this.closeDelay = pData.closeDelay;
            this._detached = (this.root !== this.$el.parentElement); 
        },
        initMount() {
            this.root = this.findRoot();
            this.initState()
            if (this.asChild && this.root) {
                const rData = Alpine.$data(this.root);
                if (rData.initAsChild(this.$el)) return true;
            }
            return false;
        },
        init() {
            if (this.initMount()) return;
        },
        handleTrigger(event) {
            if (this.disabled) return;
            const trigger = (document.activeElement && $el.contains(document.activeElement)) ? document.activeElement : $el;
            trigger.blur();
            const content = event.target.closest(`[data-slot=${this.component}-content]`);
            if (content) { content.removeAttribute('aria-hidden'); }
            if (!this._detached) toggleContent(event);
            else if (this.root) $dispatch(this.handle);
            else console.warn(`[chad-ui] ${this.component}: detached trigger has invalid or missing handle.`);
        }
    }"
    :id="id"
    @mouseenter="
        if (!root || disabled || $el.attributes.disabled) return;
        const rData = Alpine.$data(root);
        if (rData.open && !rData.openedOnHover) return;
        if (rData.openedOnHover && rData.trigger === $el) {
            rData.hoverCloseTimeout = rData.destroyTimeout(rData.hoverCloseTimeout);
            return;
        }
        rData.createHoverOpenTimeout($el, $event, delay);
    "
    @mouseleave="
        if (!root || disabled || $el.attributes.disabled) return;
        const rData = Alpine.$data(root);
        rData.hoverOpenTimeout = rData.destroyTimeout(rData.hoverOpenTimeout);
        if (rData.openedOnHover) rData.createHoverCloseTimeout($el, $event, closeDelay);
    "
    type="button"
    :data-popup-open="open ? '' : null"
    :data-trigger-disabled="disabled ? '': null"
    {{ attrs }}
    class="w-fit"
>
    {{ slot }}
</div>

{% endwith %}
