{% load static %}

<header class="sticky top-0 z-50 w-full bg-background">
    <div class="px-6! container-wrapper 3xl:fixed:px-0">
        <div class="flex h-14 items-center **:data-[slot=separator]:h-4! 3xl:fixed:container">
            <c-popover>
                <c-popover.trigger asChild>
                    <c-button variant="ghost" class="hover:bg-transparent! p-0! gap-2.5 lg:hidden">
                        <div class="flex relative justify-center items-center w-4 h-8">
                            <div class="relative size-4">
                                <span class="block absolute left-0 w-4 h-0.5 transition-all duration-100 bg-foreground" :class="open ? 'top-[0.4rem] -rotate-45' : 'top-1'"></span>
                                <span class="block absolute left-0 w-4 h-0.5 transition-all duration-100 bg-foreground" :class="open ? 'top-[0.4rem] rotate-45' : 'top-2.5'"></span>
                            </div>
                            <span class="sr-only">Toggle Menu</span>
                        </div>
                        <span class="flex items-center h-8 text-lg font-medium leading-none">Menu</span>
                    </c-button>
                </c-popover.trigger>
                <c-popover.content side="bottom" class="ring-0! min-h-dvh w-dvw bg-background/90! backdrop-blur! lg:hidden" alignOffset="-5">
                    <div class="flex overflow-auto flex-col gap-12 py-6 px-6" >
                        <div class="flex flex-col gap-4">
                            <div class="text-sm font-medium text-muted-foreground">Menu</div>
                            <div class="flex flex-col gap-3">
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{% url 'home' %}">Home</a>
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{% url 'docs:installation' %}">Docs</a>
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{% url 'docs:components' %}">Components</a>
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{% url 'docs:blocks' %}">Blocks</a>
                            </div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div class="text-sm font-medium text-muted-foreground">Sections</div>
                            <div class="flex flex-col gap-3">
                                {% for key, value in sections.items %}
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{{ value.url }}">{{ value.name }}</a>
                                {% endfor %}
                            </div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div class="text-sm font-medium text-muted-foreground">Components</div>
                            <div class="flex flex-col gap-3">
                                <a class="flex gap-2 items-center text-2xl font-medium" href="{% url 'docs:accordion' %}">Accordion</a>
                            </div>
                        </div>
                    </div>
                </c-popover.content>
            </c-popover>
            <c-button x-show="!$store.isMobile" variant="ghost" size="icon-sm" class="text-django-primary dark:text-django-secondary dark:hover:bg-django-primary! hover:bg-django-secondary!" asChild>
                <a href="{% url 'home' %}">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="size-5">
                        <rect width="256" height="256" fill="none"></rect>
                        <line x1="208" y1="128" x2="128" y2="208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"></line>
                        <line x1="192" y1="40" x2="40" y2="192" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"></line>
                    </svg>
                </a>
            </c-button>
            <nav class="hidden gap-0 items-center lg:flex">
                <c-button variant="ghost" size="sm" asChild>
                    <a href="{% url 'docs:installation' %}">Docs</a>
                </c-button>
                <c-button variant="ghost" size="sm" asChild>
                    <a href="{% url 'docs:components' %}">Components</a>
                </c-button>
                <c-button variant="ghost" size="sm" asChild>
                    <a href="{% url 'docs:blocks' %}">Blocks</a>
                </c-button>
                
            </nav>
            <div class="flex gap-2 items-center ml-auto md:flex-1 md:justify-end">
                <c-button variant="ghost" size="icon" asChild>
                    <a target="_blank" rel="noreferrer" href="https://github.com/maximbelyayev/chad-ui">
                        {% include 'svg/github.html' %}
                    </a>
                </c-button>
                <c-separator orientation="vertical" class="data-[orientation=vertical]:self-auto!" />
                <c-button variant="ghost" size="icon" id="theme-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" 
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                        class="size-4.5"
                    >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                        <path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path>
                        <path d="M12 3l0 18"></path>
                        <path d="M12 9l4.65 -4.65"></path>
                        <path d="M12 14.3l7.37 -7.37"></path>
                        <path d="M12 19.6l8.85 -8.85"></path>
                    </svg>
                </c-button>
            </div>
        </div>
    </div>
</header>
