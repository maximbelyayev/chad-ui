<c-sidebar collapsible="icon" class="sticky top-[calc(var(--header-height)+0.6rem)] z-30 hidden h-[calc(100svh-10rem)]! overscroll-none bg-transparent [--sidebar-menu-width:--spacing(56)] lg:flex">
    <div class="h-9"></div>
    <div class="absolute top-8 z-10 h-8 w-(--sidebar-menu-width) shrink-0 bg-linear-to-b from-background via-background/80 to-background/50 blur-xs"></div>
    <div class="hidden absolute bottom-0 right-2 top-12 w-px h-full from-transparent to-transparent lg:flex bg-linear-to-b via-border"></div>
    <c-sidebar.content>
        <c-sidebar.group class="pt-6">
            <c-sidebar.group.label>Sections</c-sidebar.group.label>
            <c-sidebar.menu>
                {% for key, value in sections.items %}
                <c-sidebar.menu.item>
                    <c-sidebar.menu.button tooltip="{{ value.name }}" :isActive="{{ value.url_is_active }}" asChild >
                        <a href="{{ value.url }}">
                            {% heroicon_outline 'plus' %}
                            <span>{{ value.name }}</span>
                        </a>
                    </c-sidebar.menu.button>
                </c-sidebar.menu.item>
                {% endfor %}
            </c-sidebar.menu>
        </c-sidebar.group>
        <c-sidebar.group>
            <c-sidebar.group.label>Components</c-sidebar.group.label>
            <c-sidebar.menu>
                {% for key, value in components.items %}
                <c-sidebar.menu.item>
                    <c-sidebar.menu.button tooltip="{{ value.name }}" :isActive="{{ value.url_is_active }}" asChild >
                        <a href="{{ value.url }}">
                            {% heroicon_outline 'pencil' %}
                            <span>{{ value.name }}</span>
                        </a>
                    </c-sidebar.menu.button>
                </c-sidebar.menu.item>
                {% endfor %}
            </c-sidebar.menu>
        </c-sidebar.group>
        <div class="sticky -bottom-1 z-10 h-16 shrink-0 bg-linear-to-t from-background via-background/80 to-background/50 blur-xs"></div>
    </c-sidebar.content>
</c-sidebar>
