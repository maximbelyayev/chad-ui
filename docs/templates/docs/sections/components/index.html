{% extends 'docs/base.html' %}
{% load i18n %}

{% block docs_content %}
    <div class="grid grid-cols-2 gap-4 md:grid-cols-3 md:gap-x-8 lg:gap-y-6 lg:gap-x-16 xl:gap-x-20">
        {% for key, value in components.items %}
        <a href="{{ value.url }}" class="inline-flex gap-2 items-center text-lg font-medium md:text-base hover:underline underline-offset-4">
            {{ value.name }}
        </a>
        {% endfor %}
    </div>
{% endblock %}
