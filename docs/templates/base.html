{% load static %}
{% load django_vite %}

<!doctype html>
<html lang="en" class="overscroll-y-none">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="{% static 'img/favicon.png' %}" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% vite_hmr_client %}
        {% vite_asset 'js/main.js' %}
        {% vite_asset 'js/theme.js' %}
        <title>{% block head_title %}The Foundation for your Django Design System{% endblock %} - chad/ui</title>
    </head>
    <body class="group/body overscroll-none antialiased [--footer-height:calc(var(--spacing)*14)] [--header-height:calc(var(--spacing)*14)] xl:[--footer-height:calc(var(--spacing)*24)] theme-default">
        <c-layout mobileBreakpoint="lg" class="flex flex-col">
            {% include 'header.html' %}
            <main class="flex flex-col flex-1">
                {% block content %}
                {% endblock %}
            </main>
        </c-layout>
    </body>
</html>
